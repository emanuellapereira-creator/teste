<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olá Mundo com Imagem</title>
  
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 60px;
    }

    h1 {
      font-size: 5.5rem;
      margin: 0;
      background: linear-gradient(90deg, #00f260, #0575e6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(0, 242, 96, 0.4);
      animation: pulse 3s infinite alternate;
    }

    .imagem-abaixo {
      width: 320px;
      height: 320px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      border: 5px solid rgba(255,255,255,0.15);
      transition: transform 0.4s;
    }

    .imagem-abaixo:hover {
      transform: scale(1.08) rotate(3deg);
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.06); }
    }
  </style>
</head>
<body>

  <h1>Olá Mundo!</h1>

  <!-- Imagem aparecendo ABAIXO -->
  <div class="imagem-abaixo">
    <img 
      src="https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?w=800&q=80" 
      alt="Planeta futurista com lua e estrelas"
      style="width:100%; height:100%; object-fit: cover;"
    >
  </div>

</body>
</html>
